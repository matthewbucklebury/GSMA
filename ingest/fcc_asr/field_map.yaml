# FCC ASR field mappings: positional (0-indexed) fields in the headerless
# pipe-delimited .dat files -> standard structures model.
# Pinned empirically against the 2026-06-28 weekly extract; see
# docs/session_03_handover.md for how each position was verified.

# RA.dat — one row per registration (registration numbers unique across the
# full 196,677-row extract).
ra_fields:
  file_number: 2            # application file number, A########
  registration_number: 3    # 7-digit; the native source_record_id
  unique_system_identifier: 4   # join key to EN and CO
  application_purpose: 5    # AU/NE/NT/OC/DI/CA/MD/AM
  status_code: 8            # see status_map below
  date_entered: 9           # MM/DD/YYYY
  date_received: 10
  date_issued: 11
  date_constructed: 12
  date_dismantled: 13
  date_action: 14           # most recent action; preferred record_date
  structure_street: 23
  structure_city: 24
  structure_state: 25
  height_of_structure_m: 28
  ground_elevation_m: 29
  overall_height_above_ground_m: 30   # -> height_m
  overall_height_amsl_m: 31
  structure_type: 32        # see structure_type_map

# EN.dat — entities per registration; entity_type 'O' = owner (the
# registrant; brief: "owner = registrant entity name").
en_fields:
  unique_system_identifier: 4
  entity_type: 5            # O = owner, R = contact representative
  entity_name: 9

en_owner_type: "O"

# CO.dat — coordinates per registration; coordinate_type 'T' = tower
# location ('A' = array point, ignored). DMS components, NAD83.
co_fields:
  unique_system_identifier: 4
  coordinate_type: 5        # T = tower | A = array
  lat_deg: 6
  lat_min: 7
  lat_sec: 8
  lat_dir: 9                # N | S
  lon_deg: 11
  lon_min: 12
  lon_sec: 13
  lon_dir: 14               # E | W

co_tower_type: "T"

# ASR structure-type codes -> normalised enum (raw retained in
# structure_type_raw). B* codes are structures mounted on buildings ->
# rooftop. NN* codes are the non-noticeable variants of the same shapes.
structure_type_map:
  TOWER: tower
  GTOWER: tower       # guyed
  LTOWER: tower       # lattice
  MTOWER: mast        # monopole
  NNTANN: tower
  NNGTANN: tower
  NNLTANN: tower
  NNMTANN: mast
  POLE: mast
  MAST: mast
  UPOLE: mast
  PIPE: mast
  BLDG: building
  SILO: building
  BANT: rooftop
  BMAST: rooftop
  BPIPE: rooftop
  BPOLE: rooftop
  BTWR: rooftop
  TANK: water_tower
  # STACK, SIGN, TREE, BRIDG, RIG and anything unlisted -> other

# ASR status codes observed in the full extract (C 141,463 / G 18,254 /
# A 15,628 / I 12,415 / T 8,904). C=Constructed, G=Granted, T=Terminated.
# A and I could not be confirmed against the (unreachable) FCC codes doc and
# map to 'other' pending session-5 review; the raw code is kept in the note.
status_map:
  C: active
  G: granted
  T: dismantled
  A: other
  I: other

mandatory_members: [counts, RA.dat, EN.dat, CO.dat]

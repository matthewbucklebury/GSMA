# ANFR field mappings: raw bulk-export columns -> standard structures model.
# Schema drift is a change to this file, not a code hunt (brief s6).

# One structures row per support (SUP_ID). SUP_SUPPORT has one row per
# (support, station) pair, so supports are grouped and station lists
# aggregated during normalise.

support_columns:
  id: SUP_ID
  station: STA_NM_ANFR
  nature_id: NAT_ID
  lat_deg: COR_NB_DG_LAT
  lat_min: COR_NB_MN_LAT
  lat_sec: COR_NB_SC_LAT
  lat_dir: COR_CD_NS_LAT        # N | S
  lon_deg: COR_NB_DG_LON
  lon_min: COR_NB_MN_LON
  lon_sec: COR_NB_SC_LON
  lon_dir: COR_CD_EW_LON        # E | W
  height_m: SUP_NM_HAUT         # metres (verified against source docs)
  proprietor_id: TPO_ID

station_columns:
  station: STA_NM_ANFR
  operator_id: ADM_ID
  implanted: DTE_IMPLANTATION   # DD/MM/YYYY
  modified: DTE_MODIF
  in_service: DTE_EN_SERVICE

lookup_columns:
  nature: {id: NAT_ID, label: NAT_LB_NOM}
  proprietaire: {id: TPO_ID, label: TPO_LB}
  exploitant: {id: ADM_ID, label: ADM_LB_NOM}

# validate: these must be present in the raw payload
mandatory_support_columns:
  [SUP_ID, STA_NM_ANFR, NAT_ID,
   COR_NB_DG_LAT, COR_NB_MN_LAT, COR_NB_SC_LAT, COR_CD_NS_LAT,
   COR_NB_DG_LON, COR_NB_MN_LON, COR_NB_SC_LON, COR_CD_EW_LON,
   SUP_NM_HAUT, TPO_ID]
mandatory_station_columns:
  [STA_NM_ANFR, ADM_ID, DTE_EN_SERVICE]

# structure_type: ANFR nature label (SUP_NATURE.txt, French) -> normalised
# enum. Raw label always retained in structure_type_raw. Anything unlisted
# maps to "other". Verified against the full July 2026 SUP_NATURE table.
structure_type_map:
  "Pylône": pylon
  "Pylône autoportant": pylon
  "Pylône autostable": pylon
  "Pylône haubané": pylon
  "Pylône treillis": pylon
  "Pylône tubulaire": pylon
  "pylône arbre": pylon
  "Mât": mast
  "Mât béton": mast
  "Mât métallique": mast
  "Fût": mast
  "Tour hertzienne": tower
  "Tour de contrôle": tower
  "Château d'eau - réservoir": water_tower
  "Immeuble": building
  "Bâtiment": building
  "Local technique": building
  "Monument historique": building
  "Monument religieux": building
  "Silo": building
  "Dalle en béton": rooftop

# status: the bulk export carries no per-record status column (divergence
# from the brief's assumption). Derived instead from station dates:
# any linked station with DTE_EN_SERVICE -> active; stations exist but none
# in service -> granted; no station data -> other.
status_rules:
  in_service: active
  not_in_service: granted
  no_station: other

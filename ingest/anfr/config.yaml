# ANFR adapter configuration — pinned against the live source on 2026-07-04.
#
# VERIFICATION NOTES (session 2):
# The brief (s5.1) describes "the OpenDataSoft API on data.anfr.fr" and a
# single bulk ZIP. As found at build time:
#   * data.anfr.fr has migrated off OpenDataSoft to a Drupal/"d4c" portal
#     whose catalogue API exists but exposes no bulk file attachments.
#   * The bulk open-data export is published on data.gouv.fr under ANFR's
#     official account, dataset "Données sur les installations
#     radioélectriques de plus de 5 watts", as TWO monthly ZIPs:
#       - "Tables supports antennes émetteurs bandes <month> <year>"
#         (~65 MB: SUP_SUPPORT, SUP_ANTENNE, SUP_EMETTEUR, SUP_BANDE,
#          SUP_STATION)
#       - "Tables de référence <month> <year>"
#         (~5 KB: SUP_NATURE, SUP_PROPRIETAIRE, SUP_EXPLOITANT,
#          SUP_TYPE_ANTENNE)
#   * Fetch resolves the latest pair through the stable data.gouv.fr dataset
#     API at run time (concrete file URLs change every month), so only the
#     dataset id and title patterns are pinned, plus the URLs current at
#     verification for reference.

source: anfr

discovery:
  api_url: "https://www.data.gouv.fr/api/1/datasets/551d4ff3c751df55da0cd89f/"
  dataset_id: "551d4ff3c751df55da0cd89f"
  dataset_page: "https://www.data.gouv.fr/fr/datasets/donnees-sur-les-installations-radioelectriques-de-plus-de-5-watts-1/"
  data_resource_title_pattern: "^Tables supports antennes"
  ref_resource_title_pattern: "^Tables de référence"
  # URLs current at verification (2026-07-04), July 2026 export; for
  # reference only — fetch re-resolves via the API:
  verified_data_url: "https://static.data.gouv.fr/resources/donnees-sur-les-installations-radioelectriques-de-plus-de-5-watts-1/20260702-135014/20260630-export-etalab-data.zip"
  verified_ref_url: "https://static.data.gouv.fr/resources/donnees-sur-les-installations-radioelectriques-de-plus-de-5-watts-1/20260702-134828/20260630-export-etalab-ref.zip"

raw_files:
  data_zip: "etalab-data.zip"     # local names in data/raw/anfr/{date}/
  ref_zip: "etalab-ref.zip"

zip_members:
  data:
    support: "SUP_SUPPORT.txt"    # one row per (support, station)
    station: "SUP_STATION.txt"    # station -> operator (ADM_ID) + dates
    antenne: "SUP_ANTENNE.txt"    # retained raw; not parsed in this phase
    emetteur: "SUP_EMETTEUR.txt"  # retained raw; not parsed in this phase
    bande: "SUP_BANDE.txt"        # retained raw; not parsed in this phase
  ref:
    nature: "SUP_NATURE.txt"          # NAT_ID -> structure nature label
    proprietaire: "SUP_PROPRIETAIRE.txt"  # TPO_ID -> proprietor (owner)
    exploitant: "SUP_EXPLOITANT.txt"      # ADM_ID -> operator name
    type_antenne: "SUP_TYPE_ANTENNE.txt"

csv:
  delimiter: ";"
  encoding: "utf-8"          # verified UTF-8 at build time (accented labels)
  encoding_fallback: "latin-1"

licence: "Licence Ouverte (Etalab). Attribution: ANFR, data.anfr.fr / data.gouv.fr"
refresh_cadence: "monthly"
max_row_delta_pct: 20
